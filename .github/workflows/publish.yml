name: Publish Site
on:
  push:
    branches:
      - main
permissions:
  contents: write

# This tells GitHub to use the newer Node.js engine for all steps
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4/v5 which are standard for 2026
      - uses: actions/checkout@v4 
      
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
            
      - run: pip install mkdocs-material 
      
      # This command handles the deployment to the gh-pages branch
      - run: mkdocs gh-deploy --force
